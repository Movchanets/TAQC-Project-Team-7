name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write # Необхідно для деплою на GitHub Pages
  pull-requests: write # Необхідно для коментарів Allure у PR
  checks: write # Необхідно для Allure Quality Gate перевірок

env:
  BASE_URL: https://www.greencity.cx.ua
  WORKERS: 2
  RETRIES: 1

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: npx playwright test --project=chromium --reporter=line,allure-playwright
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true # Не впаде при першому запуску, коли гілки gh-pages ще не існує
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Allure history
        if: always()
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi
          echo "=== allure-results/history/ ==="
          ls -la allure-results/history/ 2>/dev/null || echo "No history in results yet"

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean --history-limit 20

      - name: Debug report structure
        if: always()
        run: |
          echo "=== allure-report top-level ==="
          ls -la allure-report/
          echo ""
          echo "=== allure-report/history/ ==="
          ls -la allure-report/history/ 2>/dev/null || echo "NO history/ dir in report"
          echo ""
          echo "=== allure-results/ (after generate) ==="
          ls allure-results/ | head -20

      - name: Allure Pull Request Action (Official)
        uses: allure-framework/allure-action@v0
        if: github.event_name == 'pull_request' && always()
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: true
