name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write # Необхідно для деплою на GitHub Pages
  pull-requests: write # Необхідно для коментарів Allure у PR
  checks: write # Необхідно для Allure Quality Gate перевірок

env:
  BASE_URL: https://www.greencity.cx.ua
  WORKERS: 2
  RETRIES: 1

jobs:
  test:
    concurrency:
      group: allure-gh-pages-${{ github.ref }}
      cancel-in-progress: false
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: npx playwright test --project=chromium --reporter=line,allure-playwright,html
        continue-on-error: true
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Post Allure summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsDir = 'allure-results';
            let passed = 0, failed = 0, broken = 0, skipped = 0, unknown = 0, total = 0;
            const failedTests = [];

            if (fs.existsSync(resultsDir)) {
              const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('-result.json'));
              for (const file of files) {
                try {
                  const data = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
                  if (data.hidden) continue;
                  total++;
                  switch (data.status) {
                    case 'passed': passed++; break;
                    case 'failed': failed++; failedTests.push(data.name); break;
                    case 'broken': broken++; failedTests.push(data.name + ' (broken)'); break;
                    case 'skipped': skipped++; break;
                    default: unknown++; break;
                  }
                } catch (e) { /* skip malformed */ }
              }
            }

            const reportUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const statusIcon = (failed + broken) > 0 ? '❌' : '✅';

            let body = `## ${statusIcon} Allure Report Summary\n\n`;
            body += `| Passed ✅ | Failed ❌ | Broken 💥 | Skipped ⏭️ | Total |\n`;
            body += `|:---------:|:---------:|:---------:|:----------:|:-----:|\n`;
            body += `| ${passed} | ${failed} | ${broken} | ${skipped} | ${total} |\n\n`;

            if (failedTests.length > 0) {
              body += `<details>\n<summary>🔴 Failed / Broken tests (${failedTests.length})</summary>\n\n`;
              for (const name of failedTests) {
                body += `- ${name}\n`;
              }
              body += `\n</details>\n\n`;
            }

            body += `📦 [View Full Report](${reportUrl}) · [Workflow Run](${runUrl})`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Allure Report Summary'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && steps.allure-report.outcome == 'success'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
