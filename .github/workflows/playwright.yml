name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write      # Необхідно для деплою на GitHub Pages
  pull-requests: write # Необхідно для коментарів Allure у PR
  checks: write        # Необхідно для Allure Quality Gate перевірок

env:
  BASE_URL: https://www.greencity.cx.ua/#/greenCity

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Install Playwright OS Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    - name: Run Playwright tests
      env:
        LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
        LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      run: npx playwright test --reporter=line,allure-playwright
      continue-on-error: true

    - name: Get Allure history from gh-pages
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true # Не впаде при першому запуску, коли гілки gh-pages ще не існує
      with:
        ref: gh-pages
        path: gh-pages

    - name: Prepare Allure history
      if: always()
      # Ручне копіювання історії замість simple-elf
      run: |
        if [ -d "gh-pages/history" ]; then
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/
        fi

    - name: Generate Allure Report natively
      if: always()
      # Використовуємо нативну CLI утиліту для генерації звіту
      run: npx allure generate allure-results -o allure-report

    - name: Allure Pull Request Action (Official)
      # Цей крок з вашого посилання. Спрацьовує лише на PR і додає коментар зі статистикою
      uses: allure-framework/allure-action@v0
      if: github.event_name == 'pull_request' && always()
      with:
        report-directory: "./allure-report"
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy report to Github Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report