name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write # Необхідно для деплою на GitHub Pages
  pull-requests: write # Необхідно для коментарів Allure у PR
  checks: write # Необхідно для Allure Quality Gate перевірок

env:
  BASE_URL: https://www.greencity.cx.ua
  WORKERS: 2
  RETRIES: 1

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: npx playwright test --project=chromium --reporter=line,allure-playwright
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Restore Allure history from cache
        uses: actions/cache@v4
        with:
          path: allure-history
          key: allure-history-${{ github.ref_name }}
          restore-keys: |
            allure-history-${{ github.ref_name }}
            allure-history-

      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-history
          npx -p allure-commandline allure generate allure-results -o allure-report --history-dir allure-history --clean
          # Persist report history for next run's cache
          if [ -d "allure-report/history" ]; then
            rm -rf allure-history
            cp -r allure-report/history allure-history
          fi
          echo "=== allure-report/history/ ==="
          ls -la allure-report/history/ 2>/dev/null || echo "NO history/ dir in report"

      - name: Allure Pull Request Action (Official)
        uses: allure-framework/allure-action@v0
        if: github.event_name == 'pull_request' && always()
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: true
